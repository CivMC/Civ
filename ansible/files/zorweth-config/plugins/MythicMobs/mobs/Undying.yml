The_Undying:
  Type: WITHER_SKELETON
  Display: '&5&lThe Undying'
  Health: 100
  Damage: 15
  Drops:
    - light_weighted_pressure_plate{name="&eTotem Shard"} 1 0.05
    - gold_nugget{name="&eTotem Fragment"} 3-5
  Skills:
    - setvariable{var=caster.minions;type=INTEGER;val=0} @self ~onSpawn
    - skill{s=UndyingFear} @PlayersInRadius{r=25} 0.3
    - skill{s=UndyingMinionSwarm} @self 0.1
    - skill{s=UndyingGrip} @self ~onTimer:150 0.4
    - skill{s=UndyingJump} @target 0.2
    - damage{amount=25} @trigger ~onBowHit
    - ignite{ticks=20} @trigger ~onBowHit
  BossBar:
    Enabled: false
    Title: '&5&lThe Undying'
    Range: 25
    Color: DARK_PURPLE
    Style: SOLID
  Options:
    AlwaysShowName: true
    Scale: 2
    MaxCombatDistance: 25
    PreventOtherDrops: true
    KnockbackResistance: 0.5
    Despawn: NEVER
    DigOutOfGround: true
  DamageModifiers:
    - PROJECTILE 1.2
    - ENTITY_ATTACK 0.8
    - ENTITY_EXPLOSION 0
    - BLOCK_EXPLOSION 0
  KillMessages:
    - <caster.name> &4eviscerated <target.name>


UndyingMinion:
  Type: WITHER_SKELETON
  Health: 25
  Drops:
    - gold_nugget{name="&gTotem Fragment"} 0-2 0.5
    - coal 0-3
  Skills:
    - skill{s=UndyingMinionAttack} @target 0.2
    - damage{amount=16} @trigger ~onBowHit
    - ignite{ticks=20} @trigger ~onBowHit
  Options:
    MaxCombatDistance: 25
    PreventOtherDrops: true
    Despawn: NEVER
    DigOutOfGround: true
  DamageModifiers:
    - FIRE 0
    - LAVA 0
    - FIRE_TICK 0
    - PROJECTILE 0.5
