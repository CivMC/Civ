UndyingGrip:
  Cooldown: 30
  Conditions:
    - targetwithin{d=25}
  Skills:
    - forcepull{spread=2} @PlayersInRadius{r=20}
    - delay 20
    - explosion{yield=4} @Self
    - effect:sound{s=block.sculk_shrieker.shriek;volume=1.0;pitch=0.4}
UndyingFear:
  Cooldown: 12
  Conditions:
    - day false
  Skills:
    - shootskull{y=1;v=1} @target
    - delay 20
    - shootskull{y=1;v=1} @target
    - delay 20
    - shootskull{y=1;v=1} @target
UndyingJump:
  Cooldown: 30
  Conditions:
    - targetwithin{d=25}
