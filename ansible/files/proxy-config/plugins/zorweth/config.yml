database:
  driver: mariadb
  host: ${CIV_MYSQL_HOST}
  port: 3306
  user: ${CIV_MYSQL_USERNAME}
  password: ${CIV_MYSQL_PASSWORD}
  database: zorweth
  poolsize: 5
  connection_timeout: 10000
  idle_timeout: 600000
  max_lifetime: 7200000

holding-server: "pvp"
failure-message: "Unable to verify your rocket transfer. Please reconnect and try again."
main-server: main
zorweth-server: zorweth
default-server: main
